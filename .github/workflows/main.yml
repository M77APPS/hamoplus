name: بناء APK من ZIP

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "نوع البناء (debug/release)"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود (source.zip من المستودع)
        uses: actions/checkout@v4

      - name: فك ضغط source.zip
        run: |
          if [ ! -f source.zip ]; then
            echo "❌ ملف source.zip غير موجود في جذر المستودع!"
            exit 1
          fi
          mkdir project
          unzip -q source.zip -d project/
          cd project
          # لو المجلد الداخلي واحد، نفلع المستوى
          if [ $(find . -maxdepth 1 -type d | wc -l) -eq 2 ]; then
            subdir=$(find . -maxdepth 1 -type d ! -name .)
            mv $subdir/* ./
            rmdir $subdir
          fi

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3

      - name: منح صلاحيات gradlew
        working-directory: project
        run: chmod +x gradlew 2>/dev/null || true

      - name: بناء التطبيق
        working-directory: project
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: البحث عن APK
        id: find_apk
        working-directory: project
        run: |
          apk_path=$(find . -name "*.apk" | head -1)
          if [ -z "$apk_path" ]; then
            echo "❌ لم يتم العثور على APK!"
            exit 1
          fi
          cp "$apk_path" ../app.apk
          echo "✅ تم العثور على APK"

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: HemoSilentShield-${{ inputs.build_type }}
          path: app.apk
