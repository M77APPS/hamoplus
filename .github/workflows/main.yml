name: Hamo Auto-APK Builder (Clean Build)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Extract archive if present
        run: |
          ARCHIVE=$(find . -maxdepth 2 -type f \( -iname "*.zip" -o -iname "*.rar" -o -iname "*.7z" -o -iname "*.tar.gz" -o -iname "*.tgz" -o -iname "*.tar" \) | head -1)
          if [ -n "$ARCHIVE" ]; then
            mkdir -p _extracted
            case "$ARCHIVE" in
              *.zip) unzip -q -o "$ARCHIVE" -d _extracted ;;
              *.rar) unrar x -o+ "$ARCHIVE" _extracted/ ;;
              *.7z) 7z x "$ARCHIVE" -o_extracted -y ;;
              *.tar.gz|*.tgz) tar -xzf "$ARCHIVE" -C _extracted ;;
              *.tar) tar -xf "$ARCHIVE" -C _extracted ;;
            esac
            rm -f "$ARCHIVE"
            ROOT=$(find _extracted -name "build.gradle*" -printf '%h\n' | head -1)
            if [ -n "$ROOT" ]; then
              shopt -s dotglob; mv "$ROOT"/* . 2>/dev/null || true; shopt -u dotglob
            fi
            rm -rf _extracted
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare environment
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug, OU=Dev, O=CyberDefense, L=Cairo, ST=EG, C=EG" \
              -noprompt
          fi
          [ -d "app" ] && cp debug.keystore app/ 2>/dev/null || true
          chmod +x gradlew

      - name: Build Original Project
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace -Djava.awt.headless=true
          mkdir -p output-apks
          find . -path "*/build/outputs/apk/debug/*.apk" -exec cp {} output-apks/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hamo-APK
          path: output-apks/*.apk
          retention-days: 7
