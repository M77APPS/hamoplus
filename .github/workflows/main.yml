# ====================================================================
# THE OMNIPOTENT ANDROID MULTI-FORMAT COMPILER & ROOT AUTO-DISCOVERER
# ====================================================================
# Designed by: Hamo Electronic Cyber-Defense Platform (Omnipotent Edition)
# Version: 6.5.0 (Absolute Universal Industrial Grade - Total Keystore Seeder)
# Supports: Any Android Project Structure inside (.zip, .rar, .7z, .tar, .tgz)
# Automation Level: 100% (Absolute Path Virtualization)

name: Omnipotent Android APK Builder Master Pro

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DEFAULT_JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Djava.awt.headless=true -Dsun.awt.enableRemoteBlockedCheck=true"

jobs:
  omni_build:
    name: Universal Reverse Engine & Compilation Core
    runs-on: ubuntu-latest

    steps:
      - name: 1. Initialization & Workspace Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Environment Upgrade & Heavy Extraction Tools Setup
        run: |
          echo "=== Upgrading Environment Packages ==="
          sudo apt-get update -y
          echo "=== Installing Extraction Armaments (Unrar, P7zip, Unzip, Tar) ==="
          sudo apt-get install -y unzip p7zip-full unrar tar gzip coreutils sed
          echo "=== Checking Installation Status ==="
          which unzip && which 7z && which unrar && which tar

      - name: 3. Dynamic Multi-Format Archive Hunter & Auto-Extractor
        run: |
          echo "=== Starting Omnipotent Scan for Archive Files ==="
          FOUND_ARCHIVE=""
          ARCHIVE_EXT=""
          
          for ext in zip rar 7z tar.gz tgz tar; do
            MATCH=$(find . -maxdepth 2 -type f -iname "*.$ext" | head -n 1)
            if [ -n "$MATCH" ]; then
              FOUND_ARCHIVE="$MATCH"
              ARCHIVE_EXT="$ext"
              break
            fi
          done

          if [ -z "$FOUND_ARCHIVE" ]; then
            echo "⚠️ Notice: No compressed archive found in workspace root."
            echo "Checking if raw source code repository is already extracted..."
            if [ -n "$(find . -maxdepth 3 -name 'build.gradle*' -print -quit)" ]; then
              echo "✅ Raw Android project structure already exists. Skipping extraction."
              exit 0
            else
              echo "❌ CRITICAL ERROR: No archive (.zip, .rar, .7z, .tar) and no raw build.gradle detected!"
              exit 1
            fi
          fi

          echo "🎯 Target Archive Discovered: $FOUND_ARCHIVE (Type: $ARCHIVE_EXT)"
          mkdir -p omni_extracted_workspace

          echo "=== Executing Safe Extraction Sequence ==="
          case "$ARCHIVE_EXT" in
            zip)
              unzip -o "$FOUND_ARCHIVE" -d omni_extracted_workspace
              ;;
            rar)
              unrar x -o+ "$FOUND_ARCHIVE" omni_extracted_workspace/
              ;;
            7z)
              7z x "$FOUND_ARCHIVE" -oomni_extracted_workspace/ -y
              ;;
            tar.gz|tgz)
              tar -xzf "$FOUND_ARCHIVE" -C omni_extracted_workspace/
              ;;
            tar)
              tar -xf "$FOUND_ARCHIVE" -C omni_extracted_workspace/
              ;;
          esac

          echo "Cleaning up the original compressed file to free cloud memory..."
          rm -f "$FOUND_ARCHIVE"

      - name: 4. Deep Root Directory Discovery & Structural Correction
        run: |
          if [ ! -d omni_extracted_workspace ]; then
            echo "Workspace already finalized in previous step."
            exit 0
          fi

          echo "=== Hunting for the Absolute Project Root ==="
          TRUE_ROOT=$(find omni_extracted_workspace -name "build.gradle*" -exec dirname {} \; | head -n 1)

          if [ -z "$TRUE_ROOT" ]; then
            echo "❌ CRITICAL ERROR: Extracted files do not contain any Android build.gradle configuration!"
            exit 1
          fi

          echo "✅ Absolute Root Located At: -> $TRUE_ROOT"
          
          echo "=== Relocating Project to Master Workspace Root ==="
          if [ "$TRUE_ROOT" != "." ] && [ "$TRUE_ROOT" != "./" ]; then
            mv "$TRUE_ROOT"/* . 2>/dev/null || true
            mv "$TRUE_ROOT"/.* . 2>/dev/null || true
          fi
          
          echo "=== Purging Leftover Cache Folders ==="
          rm -rf omni_extracted_workspace
          find . -name "local.properties" -delete
          find . -name ".gradle" -type d -exec rm -rf {} + || true
          find . -name ".idea" -type d -exec rm -rf {} + || true
          find . -name "build" -type d -exec rm -rf {} + || true

      - name: 5. Intelligent Java Runtime Detection & Deployment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.DEFAULT_JAVA_VERSION }}
          cache: 'gradle'

      - name: 6. Autonomous Gradle Wrapper Engine Repair & Auto-Upgrader
        run: |
          echo "=== Auditing Gradle Wrapper Executables ==="
          
          WRAPPER_PROP=$(find . -name "gradle-wrapper.properties" | head -n 1)
          if [ -n "$WRAPPER_PROP" ]; then
            echo "Found existing gradle configuration at: $WRAPPER_PROP"
            echo "Forcing distributionUrl upgrade to version 9.3.1 to satisfy modern AGP requirements..."
            sed -i 's/gradle-.*-bin.zip/gradle-9.3.1-bin.zip/g' "$WRAPPER_PROP"
            sed -i 's/gradle-.*-all.zip/gradle-9.3.1-all.zip/g' "$WRAPPER_PROP"
          fi

          if [ ! -f gradlew ]; then
            echo "⚠️ Warning: 'gradlew' bootstrapper script is missing in this project!"
            gradle wrapper --gradle-version 9.3.1
          else
            echo "Updating existing gradlew script target to 9.3.1..."
            gradle wrapper --gradle-version 9.3.1 || true
          fi
          
          echo "=== Enforcing Global Script Execution Permissions ==="
          chmod +x gradlew
          echo "=== Cleaning Windows Carriage Returns (CRLF to LF Line Fixes) ==="
          sed -i 's/\r$//' gradlew

      - name: 7. Cybernetic Properties Injection (Anti-KSP & Isolation Layer)
        run: |
          echo "=== Inoculating gradle.properties against CI Crashes ==="
          PROP_FILE="gradle.properties"
          if [ ! -f "$PROP_FILE" ]; then
            touch "$PROP_FILE"
          fi
          
          cat <<EOF >> "$PROP_FILE"
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Djava.awt.headless=true
          android.useAndroidX=true
          android.enableJetifier=true
          ksp.incremental=false
          kotlin.incremental=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          EOF
          
          echo "=== Hardened Properties Successfully Registered ==="
          cat "$PROP_FILE"

      - name: 8. Auto-Heal Project Repositories (Missing Artifacts Fixer)
        run: |
          echo "=== Injecting Missing Central Repositories into build.gradle files ==="
          find . -name "build.gradle" -o -name "build.gradle.kts" | while read -r file; do
            if [ -f "$file" ]; then
              sed -i 's/repositories {/repositories { \n        google() \n        mavenCentral()/g' "$file" || true
            fi
          done

      - name: 9. Universal Encryption Key Staging (Global Absolute Path Seeding)
        run: |
          echo "=== Generating Universal Android Debug Cryptographic Key ==="
          # Generating directly in the root workspace to satisfy absolute path configurations
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Hamo Electronic,O=CyberDefense,C=EG" || true
          
          echo "=== Replicating Keystore Across All Structural Nodes ==="
          # 1. Copy to the absolute project root (fixes the exact current error)
          cp debug.keystore ./debug.keystore || true
          
          # 2. Copy to sub-module folder 'app'
          if [ -d "app" ]; then
            cp debug.keystore app/debug.keystore || true
          fi
          
          # 3. Dynamic injection to every folder hosting a build configuration file
          find . -name "build.gradle" -o -name "build.gradle.kts" | while read -r file; do
            DIR=$(dirname "$file")
            echo "Seeding backup keystore into node: $DIR"
            cp debug.keystore "$DIR/debug.keystore" || true
          done

      - name: 10. Triggering Deep Cloud Compilation Engine (Multi-Phase Fallback)
        run: |
          echo "Starting production compilation with Strict Execution parameters..."
          
          echo "=== Step A: Hard Cleaning Project Artifacts ==="
          ./gradlew clean --no-configuration-cache --no-daemon -Djava.awt.headless=true
          
          echo "=== Step B: Launching Primary Compilation Sequence ==="
          ./gradlew assembleDebug --no-configuration-cache --stacktrace --no-daemon -Djava.awt.headless=true -Dorg.gradle.workers.max=1 || {
            echo "⚠️ Primary compilation interrupted. Executing ultimate sub-task fallback extraction..."
            ./gradlew :app:assembleDebug --no-configuration-cache --no-daemon -Djava.awt.headless=true -Dorg.gradle.workers.max=1
          }

      - name: 11. Post-Compilation Mapping & Diagnostics
        run: |
          echo "=== Final Workspace Audit ==="
          ls -la
          echo "=== Compiled APK Output Registry ==="
          find . -name "*.apk" -type f

      - name: 12. Extracting and Uploading the Final Built APK
        uses: actions/upload-artifact@v4
        with:
          name: Hamo-Electronic-Unified-APK
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
          if-no-files-found: error
