name: Hamo Auto-APK Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      java-version:
        description: 'Java version'
        required: false
        default: '21'

env:
  DEFAULT_JAVA_VERSION: ${{ github.event.inputs.java-version || '21' }}
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Djava.awt.headless=true"
  ANDROID_SDK_ROOT: "/usr/local/lib/android/sdk"
  TMP_WORKSPACE: "omni_extracted_workspace"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  infinite-build:
    name: Universal Android Cyber-Compiler
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Install Extraction Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip p7zip-full unrar tar gzip coreutils sed file

      - name: Auto-Detect & Extract Archive
        id: extract
        run: |
          EXTS=(zip rar 7z tar.gz tgz tar)
          FOUND_ARCH=""
          FOUND_EXT=""
          for e in "${EXTS[@]}"; do
            CANDIDATE=$(find . -maxdepth 2 -type f \( -iname "*.$e" \) -print -quit)
            if [ -n "$CANDIDATE" ]; then
              FOUND_ARCH="$CANDIDATE"
              FOUND_EXT="$e"
              break
            fi
          done

          if [ -z "$FOUND_ARCH" ]; then
            if find . -maxdepth 3 -name 'build.gradle*' | grep -q .; then
              echo "RAW_PROJECT=true" >> $GITHUB_ENV
              exit 0
            else
              echo "No archive and no build.gradle found"
              exit 1
            fi
          fi

          mkdir -p $TMP_WORKSPACE

          case "$FOUND_EXT" in
            zip)   unzip -q -o "$FOUND_ARCH" -d $TMP_WORKSPACE ;;
            rar)   unrar x -o+ "$FOUND_ARCH" $TMP_WORKSPACE/ ;;
            7z)    7z x "$FOUND_ARCH" -o$TMP_WORKSPACE -y -bso0 ;;
            tar.gz|tgz) tar -xzf "$FOUND_ARCH" -C $TMP_WORKSPACE ;;
            tar)   tar -xf "$FOUND_ARCH" -C $TMP_WORKSPACE ;;
            *)     echo "Unsupported extension"; exit 1 ;;
          esac

          rm -f "$FOUND_ARCH"
          echo "RAW_PROJECT=false" >> $GITHUB_ENV

      - name: Locate & Move Project Root
        if: env.RAW_PROJECT != 'true'
        run: |
          TRUE_ROOT=$(find $TMP_WORKSPACE -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -printf '%h\n' | head -1)
          if [ -z "$TRUE_ROOT" ]; then
            echo "No build.gradle inside archive"
            exit 1
          fi

          if [ "$TRUE_ROOT" != "." ] && [ "$TRUE_ROOT" != "./" ]; then
            shopt -s dotglob
            mv "$TRUE_ROOT"/* .  2>/dev/null || true
            shopt -u dotglob
          fi

          rm -rf $TMP_WORKSPACE

      - name: Deep Cleanse Workspace
        run: |
          find . -name "local.properties" -delete
          find . -name ".gradle" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name ".idea" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "build" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.iml" -delete 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.DEFAULT_JAVA_VERSION }}
          cache: 'gradle'

      - name: Force Gradle Wrapper to 9.5.1
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 9.5.1 2>/dev/null || true
          fi

          WRAPPER_PROP=$(find . -name "gradle-wrapper.properties" | head -1)
          if [ -n "$WRAPPER_PROP" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-9.5.1-bin.zip|' "$WRAPPER_PROP"
          fi

          chmod +x gradlew 2>/dev/null || true
          sed -i 's/\r$//' gradlew 2>/dev/null || true

      - name: Inject Perfect gradle.properties
        run: |
          cat <<'PROPEOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Djava.awt.headless=true
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          org.gradle.caching=false
          org.gradle.daemon=false
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          kotlin.incremental=false
          kotlin.compiler.execution.strategy=in-process
          ksp.incremental=false
          PROPEOF

      - name: Ensure settings.gradle and app module
        run: |
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            if [ -d "app" ]; then
              echo 'include ":app"' > settings.gradle
            else
              echo 'rootProject.name = "app"' > settings.gradle
            fi
          fi

          if [ -d "app" ]; then
            if [ -f "settings.gradle" ] && ! grep -q ':app' settings.gradle; then
              echo 'include ":app"' >> settings.gradle
            fi
            if [ -f "settings.gradle.kts" ] && ! grep -q ':app' settings.gradle.kts; then
              echo 'include(":app")' >> settings.gradle.kts
            fi
          fi

      - name: AGP Version Detector & Repository Injector
        run: |
          find . \( -name "build.gradle" -o -name "build.gradle.kts" \) -print0 | while IFS= read -r -d '' gradlefile; do
            if ! grep -q 'google()' "$gradlefile"; then
              sed -i 's#repositories {#repositories {\n        google()\n        mavenCentral()#g' "$gradlefile"
            fi
            if ! grep -q 'jitpack.io' "$gradlefile"; then
              sed -i 's#repositories {#repositories {\n        maven { url "https://jitpack.io" }#g' "$gradlefile"
            fi
          done

      - name: Kotlin & Compose Compatibility Fixer
        run: |
          find . \( -name "build.gradle" -o -name "build.gradle.kts" \) -print0 | while IFS= read -r -d '' gradlefile; do
            if grep -q 'kotlin("jvm")' "$gradlefile" 2>/dev/null; then
              sed -i 's/kotlin("jvm") version "[^"]*"/kotlin("jvm") version "1.9.22"/g' "$gradlefile"
            fi
            if grep -q 'kotlin_version' "$gradlefile" 2>/dev/null; then
              sed -i "s/kotlin_version = '[^']*'/kotlin_version = '1.9.22'/g" "$gradlefile"
            fi
            if grep -q 'composeOptions' "$gradlefile" 2>/dev/null; then
              sed -i 's/kotlinCompilerExtensionVersion[[:space:]]*=[[:space:]]*"[^"]*"/kotlinCompilerExtensionVersion = "1.5.10"/g' "$gradlefile"
            fi
          done

      - name: Auto-Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Hamo, OU=Dev, O=CyberDefense, L=Cairo, ST=EG, C=EG" \
            -noprompt 2>/dev/null || true

          find . -type d \( -name "app" -o -name "src" \) | while read -r dir; do
            cp debug.keystore "$dir/" 2>/dev/null || true
          done
          cp debug.keystore ./debug.keystore 2>/dev/null || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: First Clean Attempt
        continue-on-error: true
        run: ./gradlew clean --no-daemon --no-configuration-cache --warning-mode=all 2>&1 || true

      - name: Assemble Debug (Multi-Path Fallback)
        id: assemble
        run: |
          set +e
          BUILD_OK=0
          if ./gradlew assembleDebug --no-daemon --stacktrace --no-configuration-cache \
               -Dorg.gradle.workers.max=2 \
               -Djava.awt.headless=true; then
            BUILD_OK=1
          elif ./gradlew :app:assembleDebug --no-daemon --stacktrace --no-configuration-cache \
               -Dorg.gradle.workers.max=2 \
               -Djava.awt.headless=true; then
            BUILD_OK=1
          elif ./gradlew assembleRelease --no-daemon --stacktrace --no-configuration-cache \
               -Dorg.gradle.workers.max=2 \
               -Djava.awt.headless=true; then
            BUILD_OK=1
          elif ./gradlew assemble --no-daemon --stacktrace --no-configuration-cache; then
            BUILD_OK=1
          fi
          echo "BUILD_OK=$BUILD_OK" >> $GITHUB_ENV
          if [ "$BUILD_OK" -eq 1 ]; then
            exit 0
          else
            exit 1
          fi
        continue-on-error: true

      - name: Post-Failure AGP Auto-Fix (Gradle 9.5.1 fixed)
        if: env.BUILD_OK == '0'
        run: |
          echo "Trying AGP 8.9.0 with Gradle 9.5.1"
          if [ -f "build.gradle" ]; then
            sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.0/g' build.gradle
          fi
          if [ -f "build.gradle.kts" ]; then
            sed -i 's/"com.android.tools.build:gradle:[^"]*"/"com.android.tools.build:gradle:8.9.0"/g' build.gradle.kts
          fi
          if ./gradlew assembleDebug --no-daemon --stacktrace --no-configuration-cache; then
            echo "BUILD_OK=1" >> $GITHUB_ENV
            exit 0
          fi

          echo "Trying AGP 8.10.0 with Gradle 9.5.1"
          if [ -f "build.gradle" ]; then
            sed -i 's/com.android.tools.build:gradle:8.9.0/com.android.tools.build:gradle:8.10.0/g' build.gradle
          fi
          if [ -f "build.gradle.kts" ]; then
            sed -i 's/"com.android.tools.build:gradle:8.9.0"/"com.android.tools.build:gradle:8.10.0"/g' build.gradle.kts
          fi
          if ./gradlew assembleDebug --no-daemon --stacktrace --no-configuration-cache; then
            echo "BUILD_OK=1" >> $GITHUB_ENV
          fi

      - name: Locate All Generated APKs
        if: always()
        run: |
          mkdir -p output-apks
          find . -type f -name "*.apk" -exec cp {} output-apks/ \;
          if [ -n "$(ls -A output-apks)" ]; then
            echo "APKS_FOUND=1" >> $GITHUB_ENV
          else
            echo "APKS_FOUND=0" >> $GITHUB_ENV
          fi

      - name: Upload APK Artifact
        if: env.APKS_FOUND == '1'
        uses: actions/upload-artifact@v4
        with:
          name: Hamo-Omnipotent-APK
          path: output-apks/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload Build Log (if no APK)
        if: env.APKS_FOUND == '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            *.log
            **/build/reports/**
          retention-days: 7
          if-no-files-found: ignore

      - name: Failure Summary
        if: failure()
        run: |
          echo "Workflow failed. Check the logs above."
