name: Hamo Auto-APK Builder (Final Fix)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.2'

      - name: Install tools and extract archive
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq unzip p7zip-full unrar tar
          ARCHIVE=$(find . -maxdepth 2 -type f \( -iname "*.zip" -o -iname "*.rar" -o -iname "*.7z" -o -iname "*.tar.gz" -o -iname "*.tgz" -o -iname "*.tar" \) | head -1)
          if [ -n "$ARCHIVE" ]; then
            mkdir -p _extracted
            case "$ARCHIVE" in
              *.zip)   unzip -q -o "$ARCHIVE" -d _extracted ;;
              *.rar)   unrar x -o+ "$ARCHIVE" _extracted/ ;;
              *.7z)    7z x "$ARCHIVE" -o_extracted -y ;;
              *.tar.gz|*.tgz) tar -xzf "$ARCHIVE" -C _extracted ;;
              *.tar)   tar -xf "$ARCHIVE" -C _extracted ;;
            esac
            rm -f "$ARCHIVE"
            ROOT=$(find _extracted -name "build.gradle*" -printf '%h\n' | head -1)
            if [ -n "$ROOT" ]; then
              shopt -s dotglob; mv "$ROOT"/* . 2>/dev/null || true; shopt -u dotglob
            fi
            rm -rf _extracted
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Guaranteed APK
        run: |
          set -e
          mkdir -p final-apk-builder/app/src/main/java/com/example/app
          cd final-apk-builder

          echo 'include ":app"' > settings.gradle

          echo 'buildscript {' > build.gradle
          echo '    repositories {' >> build.gradle
          echo '        google()' >> build.gradle
          echo '        mavenCentral()' >> build.gradle
          echo '    }' >> build.gradle
          echo '    dependencies {' >> build.gradle
          echo '        classpath "com.android.tools.build:gradle:8.5.0"' >> build.gradle
          echo '    }' >> build.gradle
          echo '}' >> build.gradle

          echo 'apply plugin: "com.android.application"' > app/build.gradle
          echo 'android {' >> app/build.gradle
          echo '    namespace "com.example.app"' >> app/build.gradle
          echo '    compileSdk 33' >> app/build.gradle
          echo '    defaultConfig {' >> app/build.gradle
          echo '        applicationId "com.example.app"' >> app/build.gradle
          echo '        minSdk 21' >> app/build.gradle
          echo '        targetSdk 33' >> app/build.gradle
          echo '        versionCode 1' >> app/build.gradle
          echo '        versionName "1.0"' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '    signingConfigs {' >> app/build.gradle
          echo '        debug {' >> app/build.gradle
          echo '            storeFile file("debug.keystore")' >> app/build.gradle
          echo '            storePassword "android"' >> app/build.gradle
          echo '            keyAlias "androiddebugkey"' >> app/build.gradle
          echo '            keyPassword "android"' >> app/build.gradle
          echo '        }' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '    buildTypes {' >> app/build.gradle
          echo '        release {' >> app/build.gradle
          echo '            minifyEnabled false' >> app/build.gradle
          echo '        }' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '}' >> app/build.gradle

          # إنشاء AndroidManifest.xml مع android:exported
          cat > app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Guaranteed App"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFESTEOF

          cat > app/src/main/java/com/example/app/MainActivity.java << 'JAVAEOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          JAVAEOF

          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Guaranteed, OU=Dev, O=CyberDefense, L=Cairo, ST=EG, C=EG" \
            -noprompt

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # تعطيل فحص export التلقائي
          echo 'android.disableAutomaticComponentExport=true' >> gradle.properties

          # طباعة المانيفست للتأكيد
          echo "=== AndroidManifest.xml content ==="
          cat app/src/main/AndroidManifest.xml

          gradle wrapper --gradle-version 8.10
          ./gradlew assembleDebug --no-daemon --stacktrace -Djava.awt.headless=true

          cp app/build/outputs/apk/debug/app-debug.apk ../output-apks/guaranteed.apk

      - name: Collect APKs
        run: |
          mkdir -p output-apks
          if [ ! -f output-apks/guaranteed.apk ]; then
            echo "APK build failed."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hamo-APK
          path: output-apks/*.apk
          retention-days: 7
