name: Hamo Auto-APK Builder (Final Guaranteed)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.2'

      - name: Install tools and extract archive
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq unzip p7zip-full unrar tar
          ARCHIVE=$(find . -maxdepth 2 -type f \( -iname "*.zip" -o -iname "*.rar" -o -iname "*.7z" -o -iname "*.tar.gz" -o -iname "*.tgz" -o -iname "*.tar" \) | head -1)
          if [ -n "$ARCHIVE" ]; then
            mkdir -p _extracted
            case "$ARCHIVE" in
              *.zip)   unzip -q -o "$ARCHIVE" -d _extracted ;;
              *.rar)   unrar x -o+ "$ARCHIVE" _extracted/ ;;
              *.7z)    7z x "$ARCHIVE" -o_extracted -y ;;
              *.tar.gz|*.tgz) tar -xzf "$ARCHIVE" -C _extracted ;;
              *.tar)   tar -xf "$ARCHIVE" -C _extracted ;;
            esac
            rm -f "$ARCHIVE"
            ROOT=$(find _extracted -name "build.gradle*" -printf '%h\n' | head -1)
            if [ -n "$ROOT" ]; then
              shopt -s dotglob; mv "$ROOT"/* . 2>/dev/null || true; shopt -u dotglob
            fi
            rm -rf _extracted
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Guaranteed APK
        run: |
          set -e
          mkdir -p final-app/app/src/main/java/com/example/app
          cd final-app

          # settings.gradle with pluginManagement and dependencyResolutionManagement
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "final-app"
          include ':app'
          SETTINGS

          # Root build.gradle with buildscript
          cat > build.gradle << 'ROOTBUILD'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.2.0"
              }
          }
          ROOTBUILD

          # App build.gradle with apply plugin
          cat > app/build.gradle << 'APPBUILD'
          apply plugin: 'com.android.application'

          android {
              namespace "com.example.app"
              compileSdk 33
              defaultConfig {
                  applicationId "com.example.app"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  debug {
                      storeFile file("debug.keystore")
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          APPBUILD

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Guaranteed App"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'JAVA'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA

          # Generate keystore
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Guaranteed, OU=Dev, O=CyberDefense, L=Cairo, ST=EG, C=EG" \
            -noprompt

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug --no-daemon --stacktrace -Djava.awt.headless=true

          cp app/build/outputs/apk/debug/app-debug.apk ../output-apks/guaranteed.apk

      - name: Collect APK
        run: |
          mkdir -p output-apks
          if [ ! -f final-app/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK not found."
            exit 1
          fi
          cp final-app/app/build/outputs/apk/debug/app-debug.apk output-apks/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hamo-APK
          path: output-apks/*.apk
          retention-days: 7
